<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פרטי ביטוח — AcciEasy</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px 16px;
      direction: rtl;
    }

    /* ── Status card (loading / error) ── */
    .status-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin: 60px auto 0;
    }

    .icon { font-size: 56px; margin-bottom: 16px; }

    .status-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 14px;
      color: #dc2626;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
      text-align: right;
    }

    .note { color: #94a3b8; font-size: 13px; margin-top: 20px; line-height: 1.6; }

    /* ── Insurance details card ── */
    .details-wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
    }

    .page-header .logo {
      font-size: 22px;
      font-weight: 800;
      color: #2563eb;
    }

    .section-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 7px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .field-row:last-child { border-bottom: none; }

    .field-label {
      font-size: 13px;
      color: #64748b;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .field-value {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
      text-align: right;
    }

    .photo-block { margin-top: 14px; }

    .photo-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .doc-photo {
      width: 100%;
      height: 560px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      display: block;
    }

    .policy-row {
      background: #f8fafc;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .policy-row:last-child { margin-bottom: 0; }

    .policy-type {
      font-size: 13px;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 6px;
    }

    .print-btn {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 24px auto 0;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 0;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }
    .print-btn:hover { background: #1d4ed8; }

    .timestamp {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 12px;
      margin-bottom: 4px;
    }

    .get-app {
      text-align: center;
      font-size: 13px;
      color: #94a3b8;
      margin-top: 20px;
      line-height: 1.6;
    }

    .print-btn:disabled { opacity: 0.6; cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    const SERVER_URL = 'https://accieasy-server-q43x.onrender.com';

    const root = document.getElementById('root');

    function showStatus(html) {
      root.innerHTML = `<div class="status-card">${html}</div>`;
    }

    function showLoading(text) {
      showStatus(`
        <div class="icon">🔒</div>
        <h1>AcciEasy</h1>
        <div class="spinner"></div>
        <p class="subtitle">${text}</p>
      `);
    }

    function showError(title, detail) {
      showStatus(`
        <div class="icon">⚠️</div>
        <h1>${title}</h1>
        <div class="error-msg">${detail}</div>
        <p class="note">בקש מהנהג האחר ליצור קוד QR חדש.</p>
      `);
    }

    function field(label, value) {
      if (!value) return '';
      return `
        <div class="field-row">
          <span class="field-label">${label}</span>
          <span class="field-value">${value}</span>
        </div>`;
    }

    function policyTypeLabel(type) {
      return type === 'mandatory' ? 'חובה' : type === 'comprehensive' ? 'מקיף' : 'צד שלישי';
    }

    function photoBlock(label, base64) {
      if (!base64) return '';
      return `
        <div class="photo-block">
          <div class="photo-label">${label}</div>
          <img class="doc-photo" src="data:image/jpeg;base64,${base64}" alt="${label}" />
        </div>`;
    }

    function renderInsuranceCard(data) {
      const d = data.driver;
      const a = data.agent;
      const v = data.vehicle;

      const createdAt = new Date(data.createdAt).toLocaleString('he-IL');

      const policiesHtml = (v?.insurancePolicies ?? []).map(p => `
        <div class="policy-row">
          <div class="policy-type">${policyTypeLabel(p.type)}</div>
          ${field('חברת ביטוח', p.companyName)}
          ${field('מספר פוליסה', p.policyNumber)}
          ${field('שם המבוטח', p.policyholderName)}
          ${field('כתובת המבוטח', p.policyholderAddress)}
        </div>`).join('');

      root.innerHTML = `
        <div class="details-wrap">
          <div class="page-header">
            <span class="logo">AcciEasy</span>
            <h1>פרטי ביטוח</h1>
          </div>

          <!-- Driver -->
          <div class="section-card">
            <div class="section-title">פרטי הנהג</div>
            ${field('שם מלא', d.fullName)}
            ${field('תעודת זהות', d.idNumber)}
            ${field('שנת לידה', d.yearOfBirth)}
            ${field('כתובת', d.address)}
            ${field('טלפון', d.phoneNumber)}
            ${photoBlock('רישיון נהיגה', d.licensePhotoBase64)}
          </div>

          <!-- Agent -->
          <div class="section-card">
            <div class="section-title">פרטי סוכן הביטוח</div>
            ${field('שם הסוכן', a.agentName)}
            ${field('טלפון', a.agentPhone)}
            ${field('כתובת', a.agentAddress)}
          </div>

          ${v ? `
          <!-- Vehicle -->
          <div class="section-card">
            <div class="section-title">פרטי הרכב</div>
            ${field('יצרן', v.make)}
            ${field('דגם', v.model)}
            ${field('מספר רישוי', v.licensePlate)}
            ${field('צבע', v.color)}
            ${field('שם הבעלים', v.ownerName)}
            ${field('כתובת הבעלים', v.ownerAddress)}
            ${photoBlock('רישיון רכב', v.carLicencePhotoBase64)}
          </div>

          <!-- Insurance policies -->
          ${policiesHtml ? `
          <div class="section-card">
            <div class="section-title">פוליסות ביטוח</div>
            ${policiesHtml}
          </div>` : ''}
          ` : ''}

          <p class="timestamp">נוצר ב-${createdAt}</p>
          <button class="print-btn" id="download-btn">⬇ הורד PDF</button>
          <div class="get-app">
            גם אתה נפגעת בתאונה? הורד את AcciEasy ושתף את הפרטים שלך בשניות.
          </div>
        </div>`;
    }

    function base64urlToBytes(b64url) {
      const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
      const padded = b64.padEnd(b64.length + (4 - b64.length % 4) % 4, '=');
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function decryptBlob(encryptedBytes, keyBytes) {
      const cryptoKey = await crypto.subtle.importKey(
        'raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']
      );
      const iv = encryptedBytes.slice(0, 12);
      const ciphertext = encryptedBytes.slice(12);
      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv }, cryptoKey, ciphertext
      );
      return new Uint8Array(decrypted);
    }

    async function main() {
      const hash = location.hash.slice(1);
      const params = new URLSearchParams(hash);
      const sessionId = params.get('s');
      const keyB64url = params.get('k');

      if (!sessionId || !keyB64url) {
        showError('קישור לא תקין', 'הקישור חסר מידע. ודא שסרקת את כל קוד ה-QR.');
        return;
      }

      showLoading('מוריד את המסמך…');

      let encryptedBytes;
      try {
        const res = await fetch(`${SERVER_URL}/file/${encodeURIComponent(sessionId)}`, {
          headers: { 'Accept': 'application/octet-stream' },
        });
        if (res.status === 404) {
          showError('הקישור פג תוקף', 'הקישור פג תוקף (תוקף של 15 דקות) או נמחק על ידי השולח.');
          return;
        }
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        encryptedBytes = new Uint8Array(await res.arrayBuffer());
      } catch {
        showError('הורדה נכשלה', 'לא ניתן להגיע לשרת. בדוק את החיבור לאינטרנט ונסה שוב.');
        return;
      }

      showLoading('מפענח…');

      let decryptedBytes;
      try {
        const keyBytes = base64urlToBytes(keyB64url);
        decryptedBytes = await decryptBlob(encryptedBytes, keyBytes);
      } catch {
        showError('פענוח נכשל', 'לא ניתן לפענח את המסמך. ייתכן שקוד ה-QR פגום.');
        return;
      }

      // Detect JSON (new format) vs legacy PDF
      const text = new TextDecoder().decode(decryptedBytes);
      let parsed = null;
      try { parsed = JSON.parse(text); } catch {}

      if (parsed && parsed.version === 1) {
        renderInsuranceCard(parsed);
        document.getElementById('download-btn').addEventListener('click', () => {
          const el = document.querySelector('.details-wrap');
          const btn = document.getElementById('download-btn');
          btn.textContent = 'יוצר PDF…';
          btn.disabled = true;
          html2pdf()
            .set({
              margin: 10,
              filename: 'accieasy-insurance.pdf',
              image: { type: 'jpeg', quality: 0.97 },
              html2canvas: { scale: 2, useCORS: true, logging: false },
              jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            })
            .from(el)
            .save()
            .then(() => {
              btn.textContent = '⬇ הורד PDF';
              btn.disabled = false;
            });
        });
      } else {
        // Legacy PDF fallback — trigger download
        const blob = new Blob([decryptedBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'insurance-info.pdf';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        showStatus(`
          <div class="icon">✅</div>
          <h1>הורדה הצליחה</h1>
          <p class="subtitle">קובץ ה-PDF הורד למכשירך.</p>
          <a href="${url}" download="insurance-info.pdf" class="print-btn">הורד שוב</a>
        `);
      }
    }

    main().catch(() => {
      showError('שגיאה בלתי צפויה', 'אירעה שגיאה. נסה לסרוק את קוד ה-QR שוב.');
    });
  </script>
</body>
</html>
