<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Insurance Information</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      color: #475569;
      font-size: 15px;
      margin-top: 12px;
    }

    .note {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 20px;
      line-height: 1.5;
    }

    .error-icon { color: #ef4444; }
    .success-icon { color: #22c55e; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 14px;
      color: #dc2626;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .get-app {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <!-- Content injected by JS -->
  </div>

  <script type="module">
    // ─── CONFIGURATION ────────────────────────────────────────────────────────
    // Update this to your deployed Render server URL
    const SERVER_URL = 'https://accident-app-server.onrender.com';
    // ──────────────────────────────────────────────────────────────────────────

    const card = document.getElementById('card');

    function show(html) {
      card.innerHTML = html;
    }

    function showLoading(text) {
      show(`
        <div class="icon">🔒</div>
        <h1>Insurance Information</h1>
        <div class="spinner"></div>
        <p class="status-text">${text}</p>
      `);
    }

    function showError(title, detail) {
      show(`
        <div class="icon error-icon">⚠️</div>
        <h1>${title}</h1>
        <div class="error-msg">${detail}</div>
        <p class="note">Ask the other driver to tap "Generate QR Code" again to create a fresh link.</p>
        <div class="get-app">Don't have the app? Search for <strong>AccidentApp</strong> on the App Store or Google Play.</div>
      `);
    }

    // ─── AES-256-GCM DECRYPT ──────────────────────────────────────────────────
    // Uses the Web Crypto API — no external library needed in modern browsers.
    // Format: [12 bytes IV | ciphertext + 16 bytes auth tag]

    function base64urlToBytes(b64url) {
      // Convert base64url → standard base64 → binary
      const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
      const padded = b64.padEnd(b64.length + (4 - b64.length % 4) % 4, '=');
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function decryptBlob(encryptedBytes, keyBytes) {
      const cryptoKey = await crypto.subtle.importKey(
        'raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']
      );
      const iv = encryptedBytes.slice(0, 12);
      const ciphertext = encryptedBytes.slice(12);
      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv },
        cryptoKey,
        ciphertext
      );
      return new Uint8Array(decrypted);
    }

    // ─── MAIN ─────────────────────────────────────────────────────────────────

    async function main() {
      // Parse #s=<sessionId>&k=<keyBase64url> from URL fragment
      const hash = location.hash.slice(1); // remove leading '#'
      const params = new URLSearchParams(hash);
      const sessionId = params.get('s');
      const keyB64url = params.get('k');

      if (!sessionId || !keyB64url) {
        showError(
          'Invalid Link',
          'This link is missing required information. Make sure you scanned the full QR code.'
        );
        return;
      }

      showLoading('Fetching your document…');

      // 1. Fetch encrypted blob from server
      let encryptedBytes;
      try {
        const res = await fetch(`${SERVER_URL}/file/${encodeURIComponent(sessionId)}`, {
          headers: { 'Accept': 'application/octet-stream' },
        });

        if (res.status === 404) {
          showError(
            'Link Expired',
            'This insurance information file has expired (links are valid for 15 minutes) or was already deleted by the sender.'
          );
          return;
        }

        if (!res.ok) {
          throw new Error(`Server error: ${res.status}`);
        }

        const buffer = await res.arrayBuffer();
        encryptedBytes = new Uint8Array(buffer);
      } catch (err) {
        showError(
          'Download Failed',
          'Could not reach the server. Please check your internet connection and try again.'
        );
        return;
      }

      showLoading('Decrypting document…');

      // 2. Decrypt — happens entirely in this browser, key never leaves device
      let pdfBytes;
      try {
        const keyBytes = base64urlToBytes(keyB64url);
        pdfBytes = await decryptBlob(encryptedBytes, keyBytes);
      } catch (err) {
        showError(
          'Decryption Failed',
          'The document could not be decrypted. The QR code may have been corrupted or tampered with.'
        );
        return;
      }

      // 3. Trigger download
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'insurance-info.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      // 4. Show success state with manual download button as fallback
      show(`
        <div class="icon success-icon">✅</div>
        <h1>Download Complete</h1>
        <p class="subtitle">The insurance information PDF has been downloaded to your device.</p>
        <a href="${url}" download="insurance-info.pdf" class="btn">
          Download Again
        </a>
        <p class="note">
          This link is valid for 15 minutes from when it was created.<br/>
          The document is encrypted end-to-end — only you can read it.
        </p>
        <div class="get-app">
          Involved in an accident too? Get the app to instantly share your own info.<br/>
          Search <strong>AccidentApp</strong> on the App Store or Google Play.
        </div>
      `);
    }

    main().catch(err => {
      console.error(err);
      showError('Unexpected Error', 'Something went wrong. Please try scanning the QR code again.');
    });
  </script>
</body>
</html>
